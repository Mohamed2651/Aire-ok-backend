services:

  db:
    image: postgres:16-alpine
    container_name: aire-ok-db-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: aire_ok_db
      POSTGRES_USER: aire_ok_user
      POSTGRES_PASSWORD: aire_ok_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aire_ok_user -d aire_ok_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: aire-ok-api-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: db
    volumes:
      - ./src:/app/src

volumes:
  db_data:
